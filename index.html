<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本接送机・包车服务｜东京 / 大阪 / 富士山・正规车辆</title>
    <link href="../styles/tailwind.css" rel="stylesheet">
    <link href="../styles/styles.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <div id="header"></div>
    
    <!-- Hero Banner -->
    <div id="hero-banner"></div>

    <main class="container mx-auto px-4">
        <section class="text-center my-8">
            <h1 class="text-3xl font-bold">正规绿牌车辆、全保险</h1>
            <p class="mt-2">准时接机、行李协助、全程安心</p>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-4 my-8">
            <div class="service-card">
                <h2 class="text-xl">✈️ 机场接送</h2>
                <p>成田 / 羽田 / 关西 / 中部</p>
            </div>
            <div class="service-card">
                <h2 class="text-xl">🚗 定制包车</h2>
                <p>富士山、京都、奈良、北海道</p>
            </div>
            <div class="service-card">
                <h2 class="text-xl">👨‍💼 商务 / 旅游包车</h2>
                <p>会议、观光、团体</p>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <script src="../scripts/main.js"></script>
    <script src="../scripts/i18n.js"></script>
    <script src="../scripts/carousel.js"></script>
    <script src="../scripts/whatsapp.js"></script>
</body>
</html>
