<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常见问题 - 日本接送机・包车服务</title>
    <link href="../styles/tailwind.css" rel="stylesheet">
    <link href="../styles/styles.css" rel="stylesheet">
</head>
<body class="bg-white text-gray-800">
    <!-- Header -->
    <div id="header"></div>
    
    <main class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-4">常见问题</h1>
        <div class="faq-item mb-4">
            <h2 class="text-xl font-semibold">1. 如何预订服务？</h2>
            <p>请联系客服，提供您的日期、航班号、人数和目的地，我们会为您确认并报价。</p>
        </div>
        <div class="faq-item mb-4">
            <h2 class="text-xl font-semibold">2. 取消预订需要收费吗？</h2>
            <p>如果您在预定时间前24小时取消预订，我们将不收取任何费用。</p>
        </div>
        <div class="faq-item mb-4">
            <h2 class="text-xl font-semibold">3. 你们的车辆是否有保险？</h2>
            <p>是的，我们的所有车辆均为正规运营，且全额投保。</p>
        </div>
        <div class="faq-item mb-4">
            <h2 class="text-xl font-semibold">4. 你们提供哪些支付方式？</h2>
            <p>我们接受现金和转账支付，具体支付方式可在确认时与客服沟通。</p>
        </div>
        <div class="faq-item mb-4">
            <h2 class="text-xl font-semibold">5. 如果航班延误怎么办？</h2>
            <p>我们提供航班延误等待服务，您只需告知我们航班信息即可。</p>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <script src="../scripts/main.js"></script>
    <script src="../scripts/i18n.js"></script>
    <script src="../scripts/whatsapp.js"></script>
</body>
</html>
