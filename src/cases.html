<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行程案例 - 日本接送机・包车服务</title>
    <link rel="stylesheet" href="../styles/tailwind.css">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
    <!-- Header -->
    <div id="header"></div>
    
    <!-- Hero Banner -->
    <div id="hero-banner"></div>

    <main class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-4">客户行程案例</h1>
        
        <section class="mb-8">
            <h2 class="text-2xl font-semibold mb-2">成功案例</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="case-item bg-white shadow-md rounded-lg p-4">
                    <h3 class="font-bold">案例一：东京市内接送</h3>
                    <p>客户在东京市内的接送体验，准时到达，服务周到。</p>
                </div>
                <div class="case-item bg-white shadow-md rounded-lg p-4">
                    <h3 class="font-bold">案例二：富士山一日游</h3>
                    <p>客户享受了富士山的美丽风景，司机提供了专业的导览服务。</p>
                </div>
                <div class="case-item bg-white shadow-md rounded-lg p-4">
                    <h3 class="font-bold">案例三：大阪商务接送</h3>
                    <p>客户在大阪的商务活动中，享受了高效的接送服务。</p>
                </div>
                <div class="case-item bg-white shadow-md rounded-lg p-4">
                    <h3 class="font-bold">案例四：京都文化之旅</h3>
                    <p>客户在京都的文化之旅中，司机提供了贴心的服务。</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <script src="../scripts/main.js"></script>
    <script src="../scripts/i18n.js"></script>
    <script src="../scripts/whatsapp.js"></script>
</body>
</html>
