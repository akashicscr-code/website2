<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预订流程 - 日本接送机服务</title>
    <link href="../styles/tailwind.css" rel="stylesheet">
    <link href="../styles/styles.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <!-- Header -->
    <div id="header"></div>
    
    <main class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-4">预订流程</h1>
        <p class="mb-4">请按照以下步骤进行预订：</p>
        <ol class="list-decimal list-inside mb-4">
            <li>联系客服（WhatsApp：<strong>+86 199 6988 2825</strong>）</li>
            <li>提供以下信息：
                <ul class="list-disc list-inside">
                    <li>日期</li>
                    <li>航班号</li>
                    <li>人数</li>
                    <li>行李数</li>
                    <li>目的地</li>
                </ul>
            </li>
            <li>客服报价→确认→留位</li>
            <li>结束后现金 / 转账支付</li>
        </ol>

        <h2 class="text-2xl font-bold mb-2">联系方式</h2>
        <p class="text-lg mb-2">WhatsApp：<strong>+86 199 6988 2825</strong></p>
        <p class="text-lg">客服时间：24 小时（日本时间）</p>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <script src="../scripts/main.js"></script>
    <script src="../scripts/whatsapp.js"></script>
</body>
</html>
