<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价格参考 - 日本接送机・包车服务</title>
    <link rel="stylesheet" href="../styles/tailwind.css">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body class="bg-gray-100">
    <header>
        <!-- Include header component -->
        <div id="header"></div>
    </header>

    <main class="container mx-auto p-4">
        <h1 class="text-3xl font-bold text-center my-6">价格参考</h1>
        <p class="text-center mb-4">参考价，以客服确认为准</p>

        <section class="mb-8">
            <h2 class="text-2xl font-semibold">东京接送机（阿尔法）</h2>
            <ul class="list-disc list-inside">
                <li>羽田↔23区：约 12,000 日元</li>
                <li>成田↔23区：约 18,000 日元</li>
            </ul>
        </section>

        <section class="mb-8">
            <h2 class="text-2xl font-semibold">大阪接送机（阿尔法）</h2>
            <ul class="list-disc list-inside">
                <li>关西↔大阪市内：约 15,000 日元</li>
            </ul>
        </section>

        <section class="mb-8">
            <h2 class="text-2xl font-semibold">包车（10小时，含司机 + 油费）</h2>
            <ul class="list-disc list-inside">
                <li>阿尔法：约 60,000 日元起</li>
                <li>海狮：约 80,000 日元起</li>
            </ul>
        </section>
    </main>

    <footer>
        <!-- Include footer component -->
        <div id="footer"></div>
    </footer>

    <script src="../scripts/main.js"></script>
    <script src="../scripts/i18n.js"></script>
    <script src="../scripts/whatsapp.js"></script>
</body>
</html>
