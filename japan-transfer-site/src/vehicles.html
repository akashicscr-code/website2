<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车型展示 - 日本接送机服务</title>
    <link rel="stylesheet" href="../styles/tailwind.css">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
    <!-- Header -->
    <div id="header"></div>
    
    <!-- Main Content -->
    <main class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-6">车型展示</h1>
        
        <section class="mb-12">
            <h2 class="text-2xl font-semibold mb-4">丰田阿尔法（Alphard）</h2>
            <img src="../assets/images/alphard.jpg" alt="丰田阿尔法" class="w-full h-auto mb-4">
            <p>座位：7 座（4 独立座椅 + 后排）</p>
            <p>适合：2–6 人、家庭 / 商务、行李多</p>
            <p>特点：豪华内饰、电动门、独立空调、舒适静音</p>
        </section>

        <section>
            <h2 class="text-2xl font-semibold mb-4">丰田海狮（Hiace）</h2>
            <img src="../assets/images/hiace.jpg" alt="丰田海狮" class="w-full h-auto mb-4">
            <p>座位：9 座（含司机）</p>
            <p>适合：7–8 人、小团体、滑雪 / 高尔夫大行李</p>
            <p>特点：高顶、超大行李舱、空间宽敞</p>
        </section>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <script src="../scripts/main.js"></script>
    <script src="../scripts/i18n.js"></script>
    <script src="../scripts/whatsapp.js"></script>
</body>
</html>
