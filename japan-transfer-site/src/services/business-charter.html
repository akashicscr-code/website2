<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商务包车服务</title>
    <link rel="stylesheet" href="../styles/tailwind.css">
</head>
<body>
    <header>
        <!-- Include header component -->
        <!-- Example: <include src="../components/header.html"></include> -->
    </header>

    <main class="container mx-auto p-4">
        <section class="my-8">
            <h1 class="text-3xl font-bold">商务包车服务</h1>
            <p class="mt-4">我们的商务包车服务为您提供舒适、便捷的出行体验，适合商务会议、团体出行等需求。</p>
        </section>

        <section class="my-8">
            <h2 class="text-2xl font-semibold">服务范围</h2>
            <ul class="list-disc list-inside mt-4">
                <li>东京市内及周边</li>
                <li>大阪市内及周边</li>
                <li>其他城市可根据需求安排</li>
            </ul>
        </section>

        <section class="my-8">
            <h2 class="text-2xl font-semibold">服务优势</h2>
            <ul class="list-disc list-inside mt-4">
                <li>丰田阿尔法（7座豪华）和海狮（9座商务）可供选择</li>
                <li>正规运营许可，确保安全可靠</li>
                <li>提供航班延误等待服务</li>
                <li>24小时在线客服，随时为您服务</li>
            </ul>
        </section>

        <section class="my-8">
            <h2 class="text-2xl font-semibold">预订流程</h2>
            <ol class="list-decimal list-inside mt-4">
                <li>联系客服（WhatsApp：+86 199 6988 2825）</li>
                <li>提供：日期、航班号、人数、行李数、目的地</li>
                <li>客服报价→确认→留位</li>
                <li>结束后现金/转账支付</li>
            </ol>
        </section>
    </main>

    <footer>
        <!-- Include footer component -->
        <!-- Example: <include src="../components/footer.html"></include> -->
    </footer>

    <script src="../scripts/main.js"></script>
    <script src="../scripts/whatsapp.js"></script>
</body>
</html>
