<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>观光包车服务</title>
    <link rel="stylesheet" href="../styles/tailwind.css">
</head>
<body>
    <header>
        <!-- Include header component -->
        <div id="header"></div>
    </header>

    <main class="container mx-auto p-4">
        <section class="text-center my-8">
            <h1 class="text-3xl font-bold">观光包车服务</h1>
            <p class="mt-4">我们提供专业的观光包车服务，带您游览日本的美丽景点。</p>
        </section>

        <section class="my-8">
            <h2 class="text-2xl font-semibold">服务范围</h2>
            <ul class="list-disc list-inside mt-4">
                <li>东京：富士山、浅草寺、秋叶原等</li>
                <li>京都：金阁寺、清水寺、岚山等</li>
                <li>大阪：大阪城、心斋桥、环球影城等</li>
                <li>其他：奈良、北海道等热门景点</li>
            </ul>
        </section>

        <section class="my-8">
            <h2 class="text-2xl font-semibold">服务优势</h2>
            <ul class="list-disc list-inside mt-4">
                <li>专业司机，熟悉各大景点</li>
                <li>灵活的行程安排，满足您的需求</li>
                <li>舒适的车辆，确保您的旅途愉快</li>
                <li>24小时在线客服，随时为您服务</li>
            </ul>
        </section>

        <section class="my-8">
            <h2 class="text-2xl font-semibold">预订流程</h2>
            <ol class="list-decimal list-inside mt-4">
                <li>联系客服（WhatsApp：+86 199 6988 2825）</li>
                <li>提供：日期、人数、目的地</li>
                <li>客服报价→确认→留位</li>
                <li>结束后现金 / 转账支付</li>
            </ol>
        </section>
    </main>

    <footer>
        <!-- Include footer component -->
        <div id="footer"></div>
    </footer>

    <script src="../scripts/main.js"></script>
    <script src="../scripts/whatsapp.js"></script>
</body>
</html>
